name: PHP → FastAPI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Init Database
      run: |
        echo "🔧 Starting DB initialization..."
        python scripts/init_db.py

    - name: Convert PHP to FastAPI
      run: |
        echo "🚀 Starting PHP → FastAPI conversion..."
        python converter/convert.py

    - name: Run Tests
      run: |
        echo "🧪 Running Pytest with verbose logs..."
        pytest -s --maxfail=1 --disable-warnings

    - name: Upload Generated API
      uses: actions/upload-artifact@v4
      with:
        name: fastapi-generated
        path: fastapi_app/
